<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Play PRO 🍔</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg, #111, #2c2c2c);
  color:white;
}

h1 { margin-top:10px; }

#gameArea {
  position:relative;
  width:100%;
  height:70vh;
  overflow:hidden;
}

.item {
  position:absolute;
  width:90px;
  cursor:pointer;
}

#scoreBoard { margin:10px; font-size:18px; }

#endScreen {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000000ee;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button {
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

#reviewBtn { background:#ffcc00; color:black; }
#restartBtn { background:#ff5733; color:white; }
</style>
</head>

<body>

<h1>🍔 Terra Challenge</h1>

<div id="scoreBoard">
Puntos: <span id="score">0</span> | Tiempo: <span id="time">30</span>s
</div>

<div id="gameArea"></div>

<div id="endScreen">
  <h2 id="resultText"></h2>
  <p>Muestra esto en caja 🎁</p>
  <h3 id="codeText"></h3>

  <button id="reviewBtn" onclick="goReview()">⭐ Dejar reseña</button>
  <button id="restartBtn" onclick="restartGame()">🔄 Jugar otra vez</button>
</div>

<script>
let score = 0;
let time = 30;
let speed = 6;
let gameRunning = true;

const gameArea = document.getElementById("gameArea");

function createItem() {
  if (!gameRunning) return;

  let item = document.createElement("img");
  let rand = Math.random();

  if (rand < 0.7) {
    item.src = "https://cdn-icons-png.flaticon.com/512/3075/3075977.png";
    item.value = 1;
  } else if (rand < 0.9) {
    item.src = "https://cdn-icons-png.flaticon.com/512/1046/1046784.png";
    item.value = 5;
  } else {
    item.src = "https://cdn-icons-png.flaticon.com/512/564/564619.png";
    item.value = -3;
  }

  item.className = "item";
  item.style.left = Math.random()*90 + "%";
  item.style.top = "0px";

  item.onclick = function() {
    score += item.value;

    if (score < 0) score = 0;

    document.getElementById("score").innerText = score;

    // 🏆 GANADOR AUTOMÁTICO
    if (score >= 100) {
      endGame(true);
    }

    item.remove();
  };

  gameArea.appendChild(item);

  let fall = setInterval(()=>{
    item.style.top = (item.offsetTop + speed) + "px";

    if (item.offsetTop > window.innerHeight) {
      item.remove();
      clearInterval(fall);
    }

    if (!gameRunning) {
      item.remove();
      clearInterval(fall);
    }
  },30);
}

// MÁS DINÁMICO
setInterval(createItem, 400);

// DIFICULTAD PROGRESIVA
setInterval(()=>{
  speed += 0.5;
},5000);

// TEMPORIZADOR
let timer = setInterval(()=>{
  if (!gameRunning) return;

  time--;
  document.getElementById("time").innerText = time;

  if (time <= 0) {
    endGame(false);
  }
},1000);

// FINAL DEL JUEGO
function endGame(autoWin = false) {
  if (!gameRunning) return;

  gameRunning = false;
  clearInterval(timer);

  let result = document.getElementById("resultText");
  let code = document.getElementById("codeText");

  if (autoWin || score >= 40) {
    result.innerHTML = "🎉 ¡GANASTE CAFÉ ESPECIAL DE TERRA!";
    code.innerHTML = "Código: TERRA-CAFE ☕";
  } else {
    result.innerHTML = "😄 ¡Casi! Intenta de nuevo";
    code.innerHTML = "Sigue jugando para ganar ☕";
  }

  document.getElementById("endScreen").style.display = "flex";
}

function restartGame() {
  location.reload();
}

function goReview() {
  window.location.href = "https://g.page/r/CRgfgSx47NtyEAE/review";
}
</script>

</body>
</html>
