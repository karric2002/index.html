<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Play PRO 🍔</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg, #111, #2c2c2c);
  color:white;
}

#gameArea {
  position:relative;
  width:100%;
  height:70vh;
  overflow:hidden;
}

.item {
  position:absolute;
  width:85px;
  cursor:pointer;
}

#scoreBoard { margin:10px; }

#endScreen {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:#000000ee;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<h1>🍔 Terra Challenge</h1>
<div id="scoreBoard">
Puntos: <span id="score">0</span> | Tiempo: <span id="time">30</span>s
</div>

<div id="gameArea"></div>

<div id="endScreen">
  <h2 id="resultText"></h2>
  <h3 id="codeText"></h3>
  <button onclick="goReview()">⭐ Reseña</button>
  <button onclick="restartGame()">🔄 Jugar</button>
</div>

<script>
let score = 0;
let time = 30;
let speed = 6;
let gameRunning = true;

const gameArea = document.getElementById("gameArea");

function createItem() {
  if (!gameRunning) return;

  let item = document.createElement("img");

  let rand = Math.random();

  if (rand < 0.7) {
    item.src = "https://cdn-icons-png.flaticon.com/512/3075/3075977.png";
    item.value = 1;
  } else if (rand < 0.9) {
    item.src = "https://cdn-icons-png.flaticon.com/512/1046/1046784.png"; // dorada
    item.value = 5;
  } else {
    item.src = "https://cdn-icons-png.flaticon.com/512/564/564619.png"; // bomba
    item.value = -3;
  }

  item.className = "item";
  item.style.left = Math.random()*90 + "%";
  item.style.top = "0px";

  item.onclick = function() {
    score += item.value;
    if (score < 0) score = 0;
    document.getElementById("score").innerText = score;
    item.remove();
  };

  gameArea.appendChild(item);

  let fall = setInterval(()=>{
    item.style.top = (item.offsetTop + speed) + "px";

    if (item.offsetTop > window.innerHeight) {
      item.remove();
      clearInterval(fall);
    }

    if (!gameRunning) {
      item.remove();
      clearInterval(fall);
    }
  },30);
}

setInterval(createItem, 400);

// AUMENTA LA DIFICULTAD PROGRESIVA
setInterval(()=>{
  speed += 0.5;
},5000);

let timer = setInterval(()=>{
  if (!gameRunning) return;

  time--;
  document.getElementById("time").innerText = time;

  if (time <= 0) endGame();
},1000);

function endGame() {
  gameRunning = false;

  let result = document.getElementById("resultText");
  let code = document.getElementById("codeText");

  if (score >= 40) {
    result.innerHTML = "🎉 ¡GANASTE CAFÉ TERRA!";
    code.innerHTML = "Código: TERRA-CAFE ☕";
  } else {
    result.innerHTML = "😄 Inténtalo otra vez";
    code.innerHTML = "Sigue jugando";
  }

  document.getElementById("endScreen").style.display = "flex";
}

function restartGame() { location.reload(); }

function goReview() {
  window.location.href = "https://g.page/r/CRgfgSx47NtyEAE/review";
}
</script>

</body>
</html>
