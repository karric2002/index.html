<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terra Play PRO 🍔</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg, #111, #2c2c2c);
  color:white;
}

h1 { margin-top:10px; }

#gameArea {
  position:relative;
  width:100%;
  height:70vh;
  overflow:hidden;
}

.item {
  position:absolute;
  width:85px;
  cursor:pointer;
}

#scoreBoard {
  margin:10px;
  font-size:18px;
}

#endScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000ee;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

button {
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

#reviewBtn {
  background:#ffcc00;
  color:black;
}

#restartBtn {
  background:#ff5733;
  color:white;
}
</style>
</head>

<body>

<h1>🍔 Terra Challenge</h1>

<div id="scoreBoard">
Puntos: <span id="score">0</span> | Tiempo: <span id="time">30</span>s
</div>

<div id="gameArea"></div>

<div id="endScreen">
  <h2 id="resultText"></h2>
  <p>Muestra esto en caja 🎁</p>
  <h3 id="codeText"></h3>

  <!-- SIEMPRE visible -->
  <button id="reviewBtn" onclick="goReview()">⭐ Dejar reseña</button>
  <button id="restartBtn" onclick="restartGame()">🔄 Jugar otra vez</button>
</div>

<script>
let score = 0;
let time = 30;
let speed = 7;
let gameRunning = true;

const gameArea = document.getElementById("gameArea");

// CREAR ITEMS
function createItem() {
  if (!gameRunning) return;

  let item = document.createElement("img");
  let rand = Math.random();

  if (rand < 0.7) {
    item.src = "https://cdn-icons-png.flaticon.com/512/3075/3075977.png";
    item.value = 1;
  } else if (rand < 0.9) {
    item.src = "https://cdn-icons-png.flaticon.com/512/1046/1046784.png";
    item.value = 5;
  } else {
    item.src = "https://cdn-icons-png.flaticon.com/512/564/564619.png";
    item.value = -3;
  }

  item.className = "item";
  item.style.left = Math.random()*90 + "%";
  item.style.top = "0px";

  item.onclick = function() {
    score += item.value;
    if (score < 0) score = 0;
    document.getElementById("score").innerText = score;
    item.remove();
  };

  gameArea.appendChild(item);

  let fall = setInterval(()=>{
    item.style.top = (item.offsetTop + speed) + "px";

    if (item.offsetTop > window.innerHeight || !gameRunning) {
      item.remove();
      clearInterval(fall);
    }
  },30);
}

// GENERACIÓN CONSTANTE
let spawn = setInterval(createItem, 400);

// AUMENTO DE DIFICULTAD
let difficulty = setInterval(()=>{
  speed += 0.5;
},5000);

// TIMER CORREGIDO
let timer = setInterval(()=>{
  if (!gameRunning) return;

  time--;
  document.getElementById("time").innerText = time;

  if (time <= 0) {
    clearInterval(timer);
    endGame();
  }
},1000);

// FINAL DEL JUEGO (CORREGIDO)
function endGame() {
  if (!gameRunning) return;

  gameRunning = false;

  clearInterval(spawn);
  clearInterval(difficulty);

  let result = document.getElementById("resultText");
  let code = document.getElementById("codeText");

  if (score >= 80) {
    result.innerHTML = "🎉 ¡GANASTE CAFÉ ESPECIAL DE TERRA!";
    code.innerHTML = "Código: TERRA-CAFE ☕";
  } else {
    result.innerHTML = "😄 ¡Casi! Inténtalo otra vez";
    code.innerHTML = "Sigue jugando para ganar ☕";
  }

  document.getElementById("endScreen").style.display = "flex";
}

// BOTONES
function restartGame() {
  location.reload();
}

function goReview() {
  window.location.href = "https://g.page/r/CRgfgSx47NtyEAE/review";
}
</script>

</body>
</html>
